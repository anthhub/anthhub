name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Main metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: anthhub
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          committer_branch: output
          committer_message: "chore(metrics): update main card"
          plugins_errors_fatal: no

      - name: Habits plugin
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.habits.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: anthhub
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          config_timezone: Asia/Shanghai
          committer_branch: output
          committer_message: "chore(metrics): update habits"
          plugins_errors_fatal: no

      - name: Isocalendar (isometric, full year)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: anthhub
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Shanghai
          committer_branch: output
          committer_message: "chore(metrics): update isocalendar"
          plugins_errors_fatal: no

      - name: Languages plugin (detailed indepth)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.languages.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: anthhub
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less, tex, shell
          plugin_languages_analysis_timeout: 15
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used, recently-used
          config_timezone: Asia/Shanghai
          committer_branch: output
          committer_message: "chore(metrics): update languages"
          plugins_errors_fatal: no
